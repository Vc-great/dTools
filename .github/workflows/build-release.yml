name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "latest"
        type: string

jobs:
  build-tauri:
    permissions: { contents: write }
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            name: "macOS Apple Silicon"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            name: "macOS Intel"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            name: "Windows"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == "Linux"
        run: sudo apt-get update && \
          sudo apt-get install -y pkg-config libssl-dev perl make build-essential
        shell: bash

      - name: Install build dependencies (macOS)
        if: runner.os == "macOS"
        run: brew install pkg-config openssl@3 perl make
        shell: bash

      - name: Install build dependencies (Windows)
        if: runner.os == "Windows"
        run: |
          choco install mingw make perl -y
        shell: powershell

      - name: Rust toolchain setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: pnpm/action-setup@v2
        with: { version: 8 }

      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: "pnpm" }

      - run: pnpm install
        shell: bash

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "${{ inputs.version || 'latest' }}"
          releaseName: "dTools ${{ inputs.version || 'latest' }}"
          releaseBody: |
            ## dTools Release ${{ inputs.version || 'latest' }}
            ### Downloads
            - **Windows**: .msi installer
            - **macOS Intel**: macOS Intel installer
            - **macOS Apple Silicon**: Apple Silicon installer
            ### Changes
            See commit history.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-portable:
    permissions: { contents: write }
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            name: "macOS-portable-arm64"
            extension: "app"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            name: "macOS-portable-x64"
            extension: "app"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            name: "Windows-portable"
            extension: "exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        if: runner.os == "Linux"
        run: sudo apt-get update && \
          sudo apt-get install -y pkg-config libssl-dev perl make build-essential
        shell: bash
      - name: Install build dependencies
        if: runner.os == "macOS"
        run: brew install pkg-config openssl@3 perl make
        shell: bash
      - name: Install build dependencies
        if: runner.os == "Windows"
        run: |
          choco install mingw make perl -y
        shell: powershell

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: pnpm/action-setup@v2
        with: { version: 8 }
      - uses: actions/setup-node@v4
        with: { node-version: "lts/*", cache: "pnpm" }

      - run: pnpm install && pnpm run build
        shell: bash

      - name: Build Tauri portable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri
          pnpm tauri build --target ${{ matrix.target }}
        shell: bash

      - name: Create artifacts dir
        run: mkdir -p portable-artifacts
        shell: bash

      - name: Prepare artifacts (macOS)
        if: runner.os == "macOS"
        shell: bash
        run: |
          cp -r "src-tauri/target/${{ matrix.target }}/release/bundle/macos/dTools.app" portable-artifacts/
          zip -r "portable-artifacts/dTools-${{ inputs.version || 'latest' }}-macOS-${{ matrix.target }}.zip" dTools.app

      - name: Prepare artifacts (Windows)
        if: runner.os == "Windows"
        shell: powershell
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/dTools.exe"
          Copy-Item -Path $src -Destination portable-artifacts -Force
          Compress-Archive -Path portable-artifacts/dTools.exe -DestinationPath portable-artifacts/dTools-${{ inputs.version || 'latest' }}-Windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ inputs.version || 'latest' }}
          path: portable-artifacts/*.zip
          retention-days: 30

      - if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || 'latest' }}
          name: "dTools ${{ inputs.version || 'latest' }}"
          files: portable-artifacts/*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
