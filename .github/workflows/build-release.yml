name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        default: 'latest'
        type: string

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS (Apple Silicon)'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS (Intel)'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        shell: bash

      - name: Install OpenSSL and setup cross-compilation (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # 安装 OpenSSL 并使用 brew 提供的前缀路径
          brew install openssl@3 || true
          BREW_OPENSSL_PREFIX="$(brew --prefix openssl@3 || echo /usr/local/opt/openssl@3)"

          # 如果目标是 x86_64，创建 /usr/local/opt 链接以兼容期望路径（有些构建脚本会查找这个路径）
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            sudo mkdir -p /usr/local/opt
            sudo ln -sf "${BREW_OPENSSL_PREFIX}" /usr/local/opt/openssl@3 || true
            echo "OPENSSL_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${BREW_OPENSSL_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
            echo "CFLAGS_x86_64_apple_darwin=-I${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "LDFLAGS_x86_64_apple_darwin=-L${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
          else
            # arm64 (Apple Silicon) 使用 brew 提供的前缀
            echo "OPENSSL_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${BREW_OPENSSL_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
          fi

          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
        shell: bash

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install
        shell: bash

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_STATIC: ${{ env.OPENSSL_STATIC }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          PKG_CONFIG_ALLOW_CROSS: ${{ env.PKG_CONFIG_ALLOW_CROSS }}
          CFLAGS_x86_64_apple_darwin: ${{ env.CFLAGS_x86_64_apple_darwin }}
          LDFLAGS_x86_64_apple_darwin: ${{ env.LDFLAGS_x86_64_apple_darwin }}
        with:
          tagName: "${{ inputs.version || 'latest' }}"
          releaseName: "dTools ${{ inputs.version || 'latest' }}"
          releaseBody: |
            ## dTools Release ${{ inputs.version || 'latest' }}
            
            ### Downloads
            - **Windows**: Download the `.msi` installer for Windows
            - **macOS Intel**: Download the Intel Mac installer
            - **macOS Apple Silicon**: Download the Apple Silicon (M1/M2) Mac installer
            
            ### Changes
            See commit history for detailed changes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-portable:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'macOS-portable-arm64'
            extension: 'app'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macOS-portable-x64'
            extension: 'app'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            name: 'Windows-portable'
            extension: 'exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSSL and setup cross-compilation (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl@3 || true
          BREW_OPENSSL_PREFIX="$(brew --prefix openssl@3 || echo /usr/local/opt/openssl@3)"

          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            sudo mkdir -p /usr/local/opt
            sudo ln -sf "${BREW_OPENSSL_PREFIX}" /usr/local/opt/openssl@3 || true
            echo "OPENSSL_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${BREW_OPENSSL_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
            echo "CFLAGS_x86_64_apple_darwin=-I${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "LDFLAGS_x86_64_apple_darwin=-L${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
          else
            echo "OPENSSL_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=${BREW_OPENSSL_PREFIX}" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${BREW_OPENSSL_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=${BREW_OPENSSL_PREFIX}/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=${BREW_OPENSSL_PREFIX}/lib" >> $GITHUB_ENV
          fi

          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
        shell: bash

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install
        shell: bash

      - name: Build frontend
        run: pnpm run build
        shell: bash

      - name: Build Tauri app (portable)
        env:
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_STATIC: ${{ env.OPENSSL_STATIC }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          PKG_CONFIG_ALLOW_CROSS: ${{ env.PKG_CONFIG_ALLOW_CROSS }}
          CFLAGS_x86_64_apple_darwin: ${{ env.CFLAGS_x86_64_apple_darwin }}
          LDFLAGS_x86_64_apple_darwin: ${{ env.LDFLAGS_x86_64_apple_darwin }}
        run: |
          cd src-tauri
          pnpm tauri build --target ${{ matrix.target }}
        shell: bash

      - name: Create portable artifacts directory (macos / linux)
        if: matrix.platform != 'windows-latest'
        run: mkdir -p portable-artifacts
        shell: bash

      - name: Create portable artifacts directory (windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          if (!(Test-Path -Path "portable-artifacts")) {
            New-Item -ItemType Directory -Path "portable-artifacts" | Out-Null
          }

      - name: Prepare portable artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cp -r "src-tauri/target/${{ matrix.target }}/release/bundle/macos/dTools.app" portable-artifacts/
          cd portable-artifacts
          zip -r "dTools-${{ inputs.version || 'latest' }}-macOS-${{ matrix.target }}-portable.zip" dTools.app
        shell: bash

      - name: Prepare portable artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $src = "src-tauri/target/${{ matrix.target }}/release/dTools.exe"
          Copy-Item -Path $src -Destination "portable-artifacts" -Force
          Set-Location portable-artifacts
          Compress-Archive -Path "dTools.exe" -DestinationPath "dTools-${{ inputs.version || 'latest' }}-Windows-portable.zip" -Force

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ inputs.version || 'latest' }}
          path: portable-artifacts/*.zip
          retention-days: 30

      - name: Create release and upload portable assets
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || 'latest' }}
          name: "dTools ${{ inputs.version || 'latest' }}"
          files: portable-artifacts/*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
