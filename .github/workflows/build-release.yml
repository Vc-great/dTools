name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        default: 'latest'
        type: string

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS (Apple Silicon)'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS (Intel)'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install OpenSSL and setup cross-compilation (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # 安装OpenSSL for both architectures
          brew install openssl@3
          
          # 检查目标架构并设置相应的环境变量
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            # 为x86_64架构设置OpenSSL路径
            echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/local/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
            
            # 为x86_64创建符号链接
            sudo mkdir -p /usr/local/opt/openssl@3
            sudo ln -sf $(brew --prefix openssl@3)/include /usr/local/opt/openssl@3/include
            sudo ln -sf $(brew --prefix openssl@3)/lib /usr/local/opt/openssl@3/lib
            
            # 设置编译器标志
            echo "CFLAGS_x86_64_apple_darwin=-I/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
            echo "LDFLAGS_x86_64_apple_darwin=-L/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
          else
            # 为arm64架构使用默认的brew路径
            echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          fi
          
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_STATIC: ${{ env.OPENSSL_STATIC }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          PKG_CONFIG_ALLOW_CROSS: ${{ env.PKG_CONFIG_ALLOW_CROSS }}
          CFLAGS_x86_64_apple_darwin: ${{ env.CFLAGS_x86_64_apple_darwin }}
          LDFLAGS_x86_64_apple_darwin: ${{ env.LDFLAGS_x86_64_apple_darwin }}
        with:
          tagName: "${{ inputs.version || 'latest' }}"
          releaseName: "dTools ${{ inputs.version || 'latest' }}"
          releaseBody: |
            ## dTools Release ${{ inputs.version || 'latest' }}
            
            ### Downloads
            - **Windows**: Download the `.msi` installer for Windows
            - **macOS Intel**: Download the Intel Mac installer
            - **macOS Apple Silicon**: Download the Apple Silicon (M1/M2) Mac installer
            
            ### Changes
            See commit history for detailed changes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-portable:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'macOS-portable-arm64'
            extension: 'app'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macOS-portable-x64'
            extension: 'app'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            name: 'Windows-portable'
            extension: 'exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenSSL and setup cross-compilation (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl@3
          
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/local/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
            
            sudo mkdir -p /usr/local/opt/openssl@3
            sudo ln -sf $(brew --prefix openssl@3)/include /usr/local/opt/openssl@3/include
            sudo ln -sf $(brew --prefix openssl@3)/lib /usr/local/opt/openssl@3/lib
            
            echo "CFLAGS_x86_64_apple_darwin=-I/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
            echo "LDFLAGS_x86_64_apple_darwin=-L/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
          else
            echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
            echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
            echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          fi
          
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri app (portable)
        env:
          OPENSSL_DIR: ${{ env.OPENSSL_DIR }}
          OPENSSL_ROOT_DIR: ${{ env.OPENSSL_ROOT_DIR }}
          OPENSSL_INCLUDE_DIR: ${{ env.OPENSSL_INCLUDE_DIR }}
          OPENSSL_LIB_DIR: ${{ env.OPENSSL_LIB_DIR }}
          OPENSSL_STATIC: ${{ env.OPENSSL_STATIC }}
          PKG_CONFIG_PATH: ${{ env.PKG_CONFIG_PATH }}
          PKG_CONFIG_ALLOW_CROSS: ${{ env.PKG_CONFIG_ALLOW_CROSS }}
          CFLAGS_x86_64_apple_darwin: ${{ env.CFLAGS_x86_64_apple_darwin }}
          LDFLAGS_x86_64_apple_darwin: ${{ env.LDFLAGS_x86_64_apple_darwin }}
        run: |
          cd src-tauri
          pnpm tauri build --target ${{ matrix.target }}
        shell: bash

      - name: Create portable artifacts directory
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            powershell -Command "if (!(Test-Path 'portable-artifacts')) { New-Item -ItemType Directory -Path 'portable-artifacts' -Force }"
          else
            mkdir -p portable-artifacts
          fi
        shell: bash

      - name: Prepare portable artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cp -r "src-tauri/target/${{ matrix.target }}/release/bundle/macos/dTools.app" portable-artifacts/
          cd portable-artifacts
          zip -r "dTools-${{ inputs.version || 'latest' }}-macOS-${{ matrix.target }}-portable.zip" dTools.app

      - name: Prepare portable artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\dTools.exe" -Destination "portable-artifacts\" -Force
          cd portable-artifacts
          Compress-Archive -Path "dTools.exe" -DestinationPath "dTools-${{ inputs.version || 'latest' }}-Windows-portable.zip" -Force
        shell: powershell

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ inputs.version || 'latest' }}
          path: portable-artifacts/*.zip
          retention-days: 30

      - name: Create release and upload portable assets
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || 'latest' }}
          name: "dTools ${{ inputs.version || 'latest' }}"
          files: portable-artifacts/*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
