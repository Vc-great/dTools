name: Manual Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      platforms:
        description: 'Select platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos-only
          - windows-only

# 合法的 permissions 写法（避免非法值）
permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }} - ${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ####################
  # macOS 多架构构建
  ####################
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    if: ${{ github.event.inputs.platforms != 'windows-only' }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable (toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          # 安装指定目标，以便 cargo 可以为 macOS aarch64 编译
          targets: ${{ matrix.target }}

      - name: Verify rust is available
        run: |
          rustc --version
          cargo --version
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build frontend
        run: pnpm run build
        shell: bash

      - name: Build Tauri App (macOS)
        id: tauri-build-macos
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
        with:
          tagName: manual-build-${{ github.run_number }}-${{ matrix.arch }}
          releaseName: "dTools [${{ matrix.arch }}] Build #${{ github.run_number }}"
          releaseBody: |
            **Build Info:**
            - Platform: macOS (${{ matrix.arch }})
            - Target: ${{ matrix.target }}
            - Type: ${{ github.event.inputs.build_type }}
            - Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          tauriScript: pnpm
          # 始终把 --target 传给 cargo；如果是 debug 加上 --debug
          args: --target ${{ matrix.target }} ${{ github.event.inputs.build_type == 'debug' && '--debug' || '' }}

      - name: Print artifactPaths (debug)
        run: |
          echo "artifactPaths raw: ${{ steps.tauri-build-macos.outputs.artifactPaths }}"
          echo "${{ steps.tauri-build-macos.outputs.artifactPaths }}" | jq -r '.[]' || true
        shell: bash

  ####################
  # Windows 构建
  ####################
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    if: ${{ github.event.inputs.platforms != 'macos-only' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable (toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false

      - name: Verify rust is available (Windows)
        run: |
          rustc --version
          cargo --version
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Windows build environment (PowerShell)
        shell: pwsh
        run: |
          # 使用系统 OpenSSL（如果需要）
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $env:GITHUB_ENV

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build frontend
        run: pnpm run build
        shell: bash

      - name: Verify frontend build (PowerShell)
        shell: pwsh
        run: |
          if (!(Test-Path "dist")) {
            Write-Host "❌ Frontend build failed - dist directory not found"
            exit 1
          }
          Write-Host "✅ Frontend build successful - dist directory exists"
          Get-ChildItem dist -Force

      - name: Build Tauri App (Windows)
        id: tauri-build
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
        with:
          tagName: manual-build-${{ github.run_number }}-${{ matrix.arch }}
          releaseName: "dTools [${{ matrix.arch }}] Build #${{ github.run_number }}"
          releaseBody: |
            **Build Info:**
            - Platform: Windows (${{ matrix.arch }})
            - Target: ${{ matrix.target }}
            - Type: ${{ github.event.inputs.build_type }}
            - Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          tauriScript: pnpm
          args: --target ${{ matrix.target }} ${{ github.event.inputs.build_type == 'debug' && '--debug' || '' }}

      - name: Create Portable Package
        shell: pwsh
        run: |
          # 获取应用版本和构建路径
          $buildType = if ("${{ github.event.inputs.build_type }}" -eq "debug") { "debug" } else { "release" }
          $targetPath = "src-tauri/target/${{ matrix.target }}/$buildType"
          
          Write-Host "=== Build Information ==="
          Write-Host "Target: ${{ matrix.target }}"
          Write-Host "Architecture: ${{ matrix.arch }}"
          Write-Host "Build Type: $buildType"
          Write-Host "Target Path: $targetPath"
          
          # 创建便携版目录
          $portableDir = "portable-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # 查找主程序exe文件
          $exePath = "$targetPath/dTools.exe"
          if (!(Test-Path $exePath)) {
            $exePath = "$targetPath/app.exe"
          }
          
          if (Test-Path $exePath) {
            Write-Host "✅ Found executable: $exePath"
            Copy-Item $exePath -Destination "$portableDir/dTools.exe" -Force
            
            # 获取文件大小
            $fileSize = (Get-Item $exePath).Length / 1MB
            Write-Host "Executable size: ${fileSize:N2} MB"
          } else {
            Write-Host "❌ No executable found at $exePath"
            Write-Host "Listing target directory contents:"
            if (Test-Path $targetPath) {
              Get-ChildItem $targetPath -File | Format-Table Name, Length
            }
            exit 1
          }
          
          # 创建README文件
          $readmeContent = "# dTools 便携版`n`n这是 dTools 的便携版本，无需安装即可使用。`n`n## 使用方法`n直接双击 dTools.exe 即可运行。`n`n## 系统要求`n- Windows 10/11 (${{ matrix.arch }})`n- WebView2 Runtime (通常系统已预装)`n`n## 构建信息`n- 构建编号: ${{ github.run_number }}`n- 提交哈希: ${{ github.sha }}`n- 构建类型: ${{ github.event.inputs.build_type }}`n- 架构: ${{ matrix.arch }}`n- 构建时间: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          
          Set-Content -Path "$portableDir/README.txt" -Value $readmeContent -Encoding UTF8
          
          # 创建压缩包
          $zipName = "dTools_manual-build-${{ github.run_number }}_${{ matrix.arch }}-portable.zip"
          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipName -Force
          
          if (Test-Path $zipName) {
            $zipSize = (Get-Item $zipName).Length / 1MB
            Write-Host "✅ Created portable package: $zipName (${zipSize:N2} MB)"
          } else {
            Write-Host "❌ Failed to create portable package"
            exit 1
          }

      - name: Upload Portable Package to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}-${{ matrix.arch }}
          files: |
            dTools_manual-build-${{ github.run_number }}_${{ matrix.arch }}-portable.zip
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Portable Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-portable
          path: |
            dTools_manual-build-${{ github.run_number }}_${{ matrix.arch }}-portable.zip
          retention-days: 30

  finalize-release:
    name: Finalize Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Update Release Body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}
          name: "dTools Manual Build #${{ github.run_number }}"
          body: |
            # 🛠️ dTools Manual Build #${{ github.run_number }}
            **构建信息:**
            - 构建类型: ${{ github.event.inputs.build_type }}
            - 平台选择: ${{ github.event.inputs.platforms }}
            - 提交哈希: ${{ github.sha }}
            - 构建时间: ${{ github.event.created_at }}
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
