name: Manual Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      platforms:
        description: 'Select platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos-only
          - windows-only

# 合法的 permissions 写法（避免非法值）
permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }} - ${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ####################
  # macOS 多架构构建
  ####################
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    if: ${{ github.event.inputs.platforms != 'windows-only' }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable (toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          # 安装指定目标，以便 cargo 可以为 macOS aarch64 编译
          targets: ${{ matrix.target }}

      - name: Verify rust is available
        run: |
          rustc --version
          cargo --version
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm -v
        shell: bash

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build frontend
        run: pnpm run build
        shell: bash

      - name: Build Tauri App (macOS)
        id: tauri-build-macos
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
        with:
          tagName: manual-build-${{ github.run_number }}-${{ matrix.arch }}
          releaseName: "dTools [${{ matrix.arch }}] Build #${{ github.run_number }}"
          releaseBody: |
            **Build Info:**
            - Platform: macOS (${{ matrix.arch }})
            - Target: ${{ matrix.target }}
            - Type: ${{ github.event.inputs.build_type }}
            - Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          tauriScript: pnpm
          # 始终把 --target 传给 cargo；如果是 debug 加上 --debug
          args: --target ${{ matrix.target }} ${{ github.event.inputs.build_type == 'debug' && '--debug' || '' }}

      - name: Print artifactPaths (debug)
        run: |
          echo "artifactPaths raw: ${{ steps.tauri-build-macos.outputs.artifactPaths }}"
          echo "${{ steps.tauri-build-macos.outputs.artifactPaths }}" | jq -r '.[]' || true
        shell: bash

  ####################
  # Windows 构建
  ####################
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    if: ${{ github.event.inputs.platforms != 'macos-only' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable (toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify rust is available (Windows)
        run: |
          rustc --version
          cargo --version
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Windows build environment (PowerShell)
        shell: pwsh
        run: |
          # 使用系统 OpenSSL（如果需要）
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $env:GITHUB_ENV

      - name: Enable Corepack & pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm -v
        shell: bash

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build frontend
        run: pnpm run build
        shell: bash

      - name: Verify frontend build (PowerShell)
        shell: pwsh
        run: |
          if (!(Test-Path "dist")) {
            Write-Host "❌ Frontend build failed - dist directory not found"
            exit 1
          }
          Write-Host "✅ Frontend build successful - dist directory exists"
          Get-ChildItem dist -Force

      - name: Build Tauri App (Windows)
        id: tauri-build-windows
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max_old_space_size=4096"
        with:
          projectPath: 'src-tauri'
          tagName: manual-build-${{ github.run_number }}-${{ matrix.arch }}
          releaseName: "dTools [${{ matrix.arch }}] Build #${{ github.run_number }}"
          releaseBody: |
            **Build Info:**
            - Platform: Windows (${{ matrix.arch }})
            - Target: ${{ matrix.target }}
            - Type: ${{ github.event.inputs.build_type }}
            - Commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          tauriScript: pnpm
          args: --target ${{ matrix.target }} ${{ github.event.inputs.build_type == 'debug' && '--debug' || '' }}

  create-portable-windows:
    name: Create Windows Portable Version
    needs: build-windows
    runs-on: windows-latest
    if: ${{ always() && (needs.build-windows.result == 'success') && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-only') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          name: artifact
          path: ./artifacts
        continue-on-error: true

      - name: Create Portable Packages
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "portable-x64", "portable-arm64"
          $buildPath = if ("${{ github.event.inputs.build_type }}" -eq "debug") { "debug" } else { "release" }

          $exeFiles = Get-ChildItem -Path "src-tauri/target" -Name "*.exe" -Recurse | Where-Object { $_ -match "dTools|app" -and $_ -notmatch "setup|install|deps" }
          foreach ($exe in $exeFiles) {
            $fullPath = Get-ChildItem -Path "src-tauri/target" -Name $exe -Recurse | Select-Object -First 1
            if ($fullPath) {
              if ($fullPath.FullName -match "x86_64-pc-windows-msvc") {
                Copy-Item $fullPath.FullName -Destination "./portable-x64/dTools.exe" -ErrorAction SilentlyContinue
              } elseif ($fullPath.FullName -match "aarch64-pc-windows-msvc") {
                Copy-Item $fullPath.FullName -Destination "./portable-arm64/dTools.exe" -ErrorAction SilentlyContinue
              }
            }
          }

          $readmeContent = @"
          # dTools 便携版
          这是 dTools 的便携版本，无需安装即可使用。
          "@

          if (Test-Path "./portable-x64/dTools.exe") {
            Set-Content -Path "./portable-x64/README.txt" -Value $readmeContent -Encoding UTF8
            Compress-Archive -Path "./portable-x64/*" -DestinationPath "dTools_manual-build-${{ github.run_number }}_x64-portable.zip" -Force
          }
          if (Test-Path "./portable-arm64/dTools.exe") {
            Set-Content -Path "./portable-arm64/README.txt" -Value $readmeContent -Encoding UTF8
            Compress-Archive -Path "./portable-arm64/*" -DestinationPath "dTools_manual-build-${{ github.run_number }}_arm64-portable.zip" -Force
          }
          Get-ChildItem -Name "*.zip"

      - name: Upload portable packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}
          files: |
            dTools_manual-build-${{ github.run_number }}_*-portable.zip
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-packages
          path: |
            dTools_manual-build-${{ github.run_number }}_*-portable.zip
          retention-days: 30
        continue-on-error: true

  finalize-release:
    name: Finalize Release
    needs: [build-macos, build-windows, create-portable-windows]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Update Release Body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}
          name: "dTools Manual Build #${{ github.run_number }}"
          body: |
            # 🛠️ dTools Manual Build #${{ github.run_number }}
            **构建信息:**
            - 构建类型: ${{ github.event.inputs.build_type }}
            - 平台选择: ${{ github.event.inputs.platforms }}
            - 提交哈希: ${{ github.sha }}
            - 构建时间: ${{ github.event.created_at }}
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
