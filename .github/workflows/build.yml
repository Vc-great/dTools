name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'manual-build'
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Intel based macs
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            arch: 'x86_64'
          - platform: 'macos-latest' # for Apple Silicon macs
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
            arch: 'x86_64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        run: pnpm tauri build ${{ matrix.args }}

      - name: Prepare artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p dist
          # 复制安装包
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" -Destination "dist/" -Force
          # 复制可执行文件
          Copy-Item "src-tauri/target/release/dTools.exe" -Destination "dist/" -Force
          # 重命名文件以包含架构信息
          Get-ChildItem "dist/*.msi" | Rename-Item -NewName { $_.Name -replace '\.msi$', '-${{ matrix.arch }}.msi' }
          Rename-Item "dist/dTools.exe" "dist/dTools-${{ matrix.arch }}.exe"
        shell: powershell

      - name: Prepare artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p dist
          # 复制 DMG 安装包
          if [ -f src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg ]; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/
            # 重命名文件以包含架构信息
            for file in dist/*.dmg; do
              mv "$file" "${file%.dmg}-${{ matrix.arch }}.dmg"
            done
          fi
          # 复制 APP 包
          if [ -d src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app ]; then
            cp -r src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app dist/
            # 压缩 APP 包以便下载
            cd dist
            for app in *.app; do
              zip -r "${app%.app}-${{ matrix.arch }}.zip" "$app"
              rm -rf "$app"
            done
            cd ..
          fi
          # 复制可执行文件
          if [ -f src-tauri/target/${{ matrix.target }}/release/dTools ]; then
            cp src-tauri/target/${{ matrix.target }}/release/dTools dist/dTools-${{ matrix.arch }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-build
          path: dist/*
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # 将所有构建产物复制到发布目录
          find artifacts -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.zip" -o -name "dTools-*" \) -exec cp {} release-assets/ \;
          # 列出所有文件
          ls -la release-assets/

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version || 'manual-build' }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=Manual Build - $VERSION" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=Release $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.tag_name }}
          name: ${{ steps.get_version.outputs.release_name }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
          artifacts: "release-assets/*"
          body: |
            ## 🚀 dTools ${{ steps.get_version.outputs.version }}
            
            ### 📦 下载说明
            
            **Windows 用户:**
            - `*.msi` - Windows 安装包（推荐）
            - `dTools-x86_64.exe` - Windows 可执行文件（绿色版）
            
            **macOS 用户:**
            - `*-x86_64.dmg` - Intel Mac 安装包
            - `*-aarch64.dmg` - Apple Silicon (M1/M2) Mac 安装包  
            - `*-x86_64.zip` - Intel Mac 应用包
            - `*-aarch64.zip` - Apple Silicon Mac 应用包
            - `dTools-x86_64` - Intel Mac 可执行文件
            - `dTools-aarch64` - Apple Silicon Mac 可执行文件
            
            ### 🔧 部署工具功能
            - ✅ 自动化前端部署流程
            - ✅ Git 仓库克隆与分支切换
            - ✅ SSH 文件传输和远程执行
            - ✅ Docker 镜像构建与容器部署
            - ✅ 实时部署日志监控
            - ✅ 跨平台支持 (Windows/macOS)
            
            ### 📋 更新内容
            - 🆕 增加部署前目录清理功能
            - 🆕 增强 Git 日志信息显示
            - 🆕 自动化构建和发布流程
            - 🐛 修复已知问题
            
            ### ⚠️ 系统要求
            - **Windows:** Windows 10 或更高版本
            - **macOS:** macOS 10.15 或更高版本
            
            ---
            
            构建时间: ${{ github.run_number }} | 提交: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
